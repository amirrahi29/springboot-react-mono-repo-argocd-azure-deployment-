# platform_branch: Argo CD "platform" Application source revision only (bootstrap).
# Per-env apps (dev/main/staging/uat) use the branch with the same name — see applicationset.yaml targetRevision: '{{env}}'.
git:
  repo_url: https://github.com/amirrahi29/springboot-react-mono-repo-argocd-azure-deployment-.git
  platform_branch: main
  platform_path: gitops/argocd/platform

azure:
  acr_name: rahicontaineregistry
  acr_login_server: rahicontaineregistry.azurecr.io
  tenant_id:
  subscription_id:
  client_id:

app:
  image_name: rahi-chat-app

helm:
  chart_path: gitops/helm/rahi-chat-app
  version: v3.14.4

argocd:
  app_prefix: rahi-chat-app
  # namespace: argocd  # optional; verify/rollback need argocd-cm here (default argocd)

aks:
  resource_group: RahiResource
  cluster_name: ChatAppCluster
